<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>front_top 一拍执行顺序</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #1d2527;
      --muted: #637174;
      --line: #d8e1e3;
      --soft: #eef5f6;
      --read: #e7f5ee;
      --comb: #fff5dc;
      --write: #eef0ff;
      --state: #f4f0ff;
      --active: #c94134;
      --active-soft: #fff0ec;
      --radius: 8px;
      --shadow: 0 14px 34px rgba(31, 50, 55, 0.12);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
    }

    .page {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(560px, 1fr) minmax(300px, 390px);
      gap: 14px;
      min-height: 100vh;
      padding: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .nav,
    .detail {
      overflow: auto;
      padding: 16px;
    }

    .canvas {
      overflow: auto;
      padding: 18px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h2 {
      margin: 20px 0 10px;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.35;
    }

    p,
    li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    a {
      color: #175f8f;
      text-decoration: none;
      font-weight: 650;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary {
      border: 1px solid #cfdee1;
      border-radius: var(--radius);
      background: #f9fcfc;
      padding: 12px;
      margin: 12px 0;
    }

    .summary strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .steps {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    button.step-tab {
      width: 100%;
      min-height: 44px;
      border: 1px solid #d3dee0;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      padding: 8px 10px;
      text-align: left;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    button.step-tab:hover {
      border-color: #94aeb4;
      background: #f4fafb;
    }

    button.step-tab.active {
      border-color: var(--active);
      background: var(--active-soft);
    }

    .step-tab span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .step-tab strong {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
      line-height: 1.25;
    }

    .flow {
      display: grid;
      gap: 10px;
      max-width: 980px;
      margin: 0 auto;
    }

    .flow-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .phase-label {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdfd;
      color: #526368;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      padding: 8px;
    }

    .cards {
      display: grid;
      gap: 9px;
    }

    .cards.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cards.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .flow-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      padding: 12px 13px;
      min-height: 84px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .flow-card:hover {
      border-color: #9bb3b8;
      box-shadow: 0 8px 18px rgba(31, 50, 55, 0.08);
      transform: translateY(-1px);
    }

    .flow-card.active {
      border-color: var(--active);
      box-shadow: 0 0 0 2px rgba(201, 65, 52, 0.12), 0 12px 24px rgba(201, 65, 52, 0.12);
    }

    .flow-card.read {
      background: var(--read);
    }

    .flow-card.comb {
      background: var(--comb);
    }

    .flow-card.write {
      background: var(--write);
    }

    .flow-card.state {
      background: var(--state);
    }

    .flow-card small {
      display: block;
      margin-bottom: 6px;
      color: #6b7a7e;
      font-size: 11px;
      font-weight: 650;
    }

    .flow-card strong {
      display: block;
      margin-bottom: 6px;
      color: #1f2b2e;
      font-size: 14px;
      line-height: 1.25;
    }

    .flow-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }

    .arrow {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: center;
      color: #7c8e93;
      font-size: 12px;
      font-weight: 650;
    }

    .arrow div:last-child {
      height: 22px;
      border-left: 2px solid #c8d7da;
      margin-left: 18px;
    }

    .detail-title {
      margin: 0 0 6px;
      font-size: 19px;
      line-height: 1.25;
    }

    .detail-subtitle {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .kv {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 8px;
      margin: 9px 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .kv span:first-child {
      color: var(--muted);
    }

    code {
      border: 1px solid #dce6e8;
      border-radius: 4px;
      background: #f5f8f9;
      padding: 1px 5px;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .code-list,
    .bullet-list {
      display: grid;
      gap: 7px;
      margin: 8px 0 14px;
    }

    .code-list code {
      display: block;
      padding: 7px 8px;
      line-height: 1.45;
    }

    .bullet-list div {
      border: 1px solid #dce6e8;
      border-radius: 6px;
      background: #fbfdfd;
      padding: 8px 9px;
      color: #52666b;
      font-size: 12px;
      line-height: 1.5;
    }

    .storage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .storage-card {
      border: 1px dashed #aebdc1;
      border-radius: var(--radius);
      background: #fbfdfd;
      padding: 10px;
    }

    .storage-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .storage-card p {
      margin: 0;
      font-size: 12px;
    }

    @media (max-width: 1180px) {
      .page {
        grid-template-columns: 260px 1fr;
      }

      .detail {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .page,
      .flow-row,
      .arrow {
        grid-template-columns: 1fr;
      }

      .cards.two,
      .cards.three,
      .storage-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="panel nav">
      <h1>front_top 一拍执行顺序</h1>
      <p>这版图按第一次读代码的顺序组织：先看 CPU 怎么进入 <code>front_top()</code>，再看本拍组合逻辑按什么顺序执行，最后看状态在哪里统一写回。</p>

      <div class="summary">
        <strong>一句话主线</strong>
        <p><code>front_top()</code> 内先 <code>front_seq_read()</code> 读旧状态，再 <code>front_comb_calc()</code> 顺序计算 next 请求，最后 <code>front_seq_write()</code> 统一提交寄存器、FIFO、RAM 和表项状态。</p>
      </div>

      <h2>步骤导航</h2>
      <div class="steps" id="stepTabs"></div>

      <h2>参考文件</h2>
      <p>旧拓扑高亮图保留为参考：<a href="front_top_interactive.html">front_top_interactive.html</a></p>
    </aside>

    <main class="panel canvas">
      <div class="flow" id="flow"></div>

      <h2>状态到底放在哪里</h2>
      <div class="storage-grid" id="storageGrid"></div>
    </main>

    <section class="panel detail">
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-subtitle" id="detailSubtitle"></div>
      <div id="detailBody"></div>
    </section>
  </div>

  <script>
    "use strict";

    const steps = [

      {

        summary: "将 instruction FIFO 和 PTAB 输出对齐，检查预测是否需要修正或 flush。",
        reads: ["saved_fifo_out", "saved_ptab_out"],
        writes: ["checker_out", "do_predecode_flush", "predecode_flush_address"],
        evidence: [
          "simulator-new/front-end/front_top.cpp:765 定义 front_checker_input_comb()",
          "simulator-new/front-end/front_top.cpp:1728-1730 调 front_checker_input_comb()",
          "simulator-new/front-end/front_top.cpp:1732 调 predecode_checker_seq_read()",
          "simulator-new/front-end/front_top.cpp:1733 调 predecode_checker_comb()",
          "simulator-new/front-end/predecode_checker.cpp:16 定义 predecode_checker_comb()"
        ]
      },
      {
        id: "front2back_write",
        group: "组合逻辑",
        phase: "阶段 10",
        title: "front_front2back_write_comb + front2back_FIFO_comb_calc",
        type: "comb",
        file: "simulator-new/front-end/front_top.cpp",
        lines: "1749-1797",
        summary: "把指令、预测上下文、checker 修正结果打包，写入 front2back FIFO。",
        reads: ["saved_fifo_out", "saved_ptab_out", "checker_out", "front2back_can_write"],
        writes: ["front2back_fifo_req", "bypass_front2back_fifo_out"],
        evidence: [
          "simulator-new/front-end/front_top.cpp:780 定义 front_front2back_write_comb()",
          "simulator-new/front-end/front_top.cpp:1749-1756 计算 front2back_can_write",
          "simulator-new/front-end/front_top.cpp:1773-1780 调 front_front2back_write_comb()",
          "simulator-new/front-end/front_top.cpp:1792-1797 调 front2back_FIFO_comb_calc()"
        ]
      },
      {
        id: "flush_state",
        group: "组合逻辑",
        phase: "阶段 11",
        title: "flush 状态请求生成",
        type: "comb",
        file: "simulator-new/front-end/front_top.cpp",
        lines: "1802-1816",
        summary: "发生 checker flush 时发 ICache invalidate-only 请求，并把下一拍要使用的 predecode_refetch 状态写入 req。",
        reads: ["do_predecode_flush", "predecode_flush_address"],
        writes: ["front_state_req.next_predecode_refetch", "front_state_req.next_predecode_refetch_address"],
        evidence: [
          "simulator-new/front-end/front_top.cpp:1802 设置 front_state_req.valid = true",
          "simulator-new/front-end/front_top.cpp:1803-1808 flush 时调 icache_comb_calc() invalidate 分支",
          "simulator-new/front-end/front_top.cpp:1810-1816 写 next_predecode_refetch 和 next_predecode_refetch_address"
        ]
      },
      {
        id: "front_output",
        group: "组合逻辑",
        phase: "阶段 12",
        title: "front_output_comb",
        type: "comb",
        file: "simulator-new/front-end/front_top.cpp",
        lines: "1822-1841",
        summary: "刷新 FIFO full/empty next 状态，选择 front2back FIFO 输出或 bypass 输出，生成最终 front_top_out。",
        reads: ["front2back FIFO 输出", "bypass_front2back_fifo_out", "各 FIFO/PTAB size"],
        writes: ["front_state_req.next_*_full/empty", "front_top_out"],
        evidence: [
          "simulator-new/front-end/front_top.cpp:1822-1831 计算下一拍 FIFO/PTAB full/empty 状态",
          "simulator-new/front-end/front_top.cpp:1833-1838 调 front_output_comb()",
          "simulator-new/front-end/front_top.cpp:1839 写 *out_ptr",
          "simulator-new/front-end/front_top.cpp:858 定义 front_output_comb()"
        ]
      },
      {
        id: "seq_write",
        group: "统一写回",
        phase: "本拍结束",
        title: "front_seq_write",
        type: "write",
        file: "simulator-new/front-end/front_top.cpp",
        lines: "2034-2062",
        summary: "本拍所有组合逻辑只产生请求，真正改变寄存器、FIFO、RAM、预测表状态集中在这里。",
        reads: ["FrontUpdateRequest req", "req.front_state"],
        writes: ["BPU 状态", "四个 FIFO/PTAB 状态", "ICache 状态", "front_top 本地状态寄存器"],
        evidence: [
          "simulator-new/front-end/front_top.cpp:2034 定义 front_seq_write()",
          "simulator-new/front-end/front_top.cpp:2040-2042 调 bpu_instance.bpu_seq_write()",
          "simulator-new/front-end/front_top.cpp:2043-2046 依次写 fetch FIFO、instruction FIFO、PTAB、front2back FIFO",
          "simulator-new/front-end/front_top.cpp:2047 调 predecode_checker_seq_write()",
          "simulator-new/front-end/front_top.cpp:2048 调 icache_seq_write()",
          "simulator-new/front-end/front_top.cpp:2050-2062 统一写回 front_top 本地状态"
        ]
      }
    ];

    const storage = [
      {
        name: "front_top 本地状态寄存器",
        text: "保存 predecode_refetch、predecode_refetch_address、统计状态、FIFO full/empty 状态位。源码变量名里的 latch 按上一拍状态位理解。",
        source: "simulator-new/front-end/front_top.cpp:25-37, 1999-2010, 2050-2062"
      },
      {
        name: "BPU 寄存器、队列、预测表",
        text: "pc_reg/state、RAS、update_queue、NLP、TypePredictor、TAGE、BTB/BHT/TC 都在 BPU 子模块内部。",
        source: "simulator-new/front-end/BPU/BPU.h:638-691, 740-947, 1827-1927"
      },
      {
        name: "四个前端 FIFO/PTAB",
        text: "fetch_address_FIFO、instruction_FIFO、PTAB、front2back_FIFO 的 entries_ 和 size_ 在各自模型内部。",
        source: "simulator-new/front-end/fifo/*.cpp"
      },
      {
        name: "ICache 寄存器/RAM",
        text: "ICache 控制状态在 icache_module.h，data/tag/valid 表由 GenericTable 和 icache.cpp 实例管理。",
        source: "simulator-new/front-end/icache/include/icache_module.h:119-144, icache.cpp:256-258"
      }
    ];

    const groups = [
      { name: "入口", ids: ["cpu_entry", "step_bpu", "front_top"] },
      { name: "读旧状态", ids: ["seq_read"] },
      { name: "组合逻辑", ids: ["comb_init", "global_control", "read_enable", "read_stage", "bpu", "fetch_fifo_write", "icache", "predecode", "ptab_write", "checker", "front2back_write", "flush_state", "front_output"] },
      { name: "统一写回", ids: ["seq_write"] }
    ];

    const stepById = new Map(steps.map((step) => [step.id, step]));
    const stepTabs = document.getElementById("stepTabs");
    const flow = document.getElementById("flow");
    const storageGrid = document.getElementById("storageGrid");
    const detailTitle = document.getElementById("detailTitle");
    const detailSubtitle = document.getElementById("detailSubtitle");
    const detailBody = document.getElementById("detailBody");
    let activeId = "front_top";

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function stepClass(step) {
      if (step.type === "read") return "read";
      if (step.type === "write") return "write";
      if (step.type === "comb") return "comb";
      return "";
    }

    function renderList(items) {
      return `<div class="bullet-list">${items.map((item) => `<div>${escapeHtml(item)}</div>`).join("")}</div>`;
    }

    function renderEvidence(items) {
      return `<div class="code-list">${items.map((item) => `<code>${escapeHtml(item)}</code>`).join("")}</div>`;
    }

    function renderTabs() {
      stepTabs.innerHTML = "";
      steps.forEach((step) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `step-tab${step.id === activeId ? " active" : ""}`;
        button.dataset.stepId = step.id;
        button.innerHTML = `<strong>${escapeHtml(step.phase)} ${escapeHtml(step.title)}</strong><span>${escapeHtml(step.file)}:${escapeHtml(step.lines)}</span>`;
        button.addEventListener("click", () => selectStep(step.id));
        stepTabs.appendChild(button);
      });
    }

    function renderFlow() {
      flow.innerHTML = "";
      groups.forEach((group, index) => {
        if (index > 0) {
          const arrow = document.createElement("div");
          arrow.className = "arrow";
          arrow.innerHTML = `<span></span><div></div>`;
          flow.appendChild(arrow);
        }

        const row = document.createElement("section");
        row.className = "flow-row";
        row.innerHTML = `<div class="phase-label">${escapeHtml(group.name)}</div>`;
        const cards = document.createElement("div");
        cards.className = `cards ${group.ids.length > 7 ? "three" : group.ids.length > 1 ? "two" : ""}`;
        group.ids.forEach((id) => {
          const step = stepById.get(id);
          const card = document.createElement("article");
          card.className = `flow-card ${stepClass(step)}${step.id === activeId ? " active" : ""}`;
          card.dataset.stepId = step.id;
          card.innerHTML = `
            <small>${escapeHtml(step.phase)} | ${escapeHtml(step.file)}:${escapeHtml(step.lines)}</small>
            <strong>${escapeHtml(step.title)}</strong>
            <p>${escapeHtml(step.summary)}</p>
          `;
          card.addEventListener("click", () => selectStep(step.id));
          cards.appendChild(card);
        });
        row.appendChild(cards);
        flow.appendChild(row);
      });
    }

    function renderStorage() {
      storageGrid.innerHTML = storage.map((item) => `
        <article class="storage-card">
          <strong>${escapeHtml(item.name)}</strong>
          <p>${escapeHtml(item.text)}</p>
          <p><code>${escapeHtml(item.source)}</code></p>
        </article>
      `).join("");
    }

    function renderDetail() {
      const step = stepById.get(activeId);
      detailTitle.textContent = step.title;
      detailSubtitle.textContent = `${step.phase} | ${step.file}:${step.lines}`;
      detailBody.innerHTML = `
        <p>${escapeHtml(step.summary)}</p>
        <div class="kv"><span>阶段</span><strong>${escapeHtml(step.group)}</strong></div>
        <div class="kv"><span>源码</span><code>${escapeHtml(step.file)}:${escapeHtml(step.lines)}</code></div>
        <h2>这一阶段读取</h2>
        ${renderList(step.reads)}
        <h2>这一阶段产生</h2>
        ${renderList(step.writes)}
        <h2>源码依据</h2>
        ${renderEvidence(step.evidence)}
      `;
    }

    function selectStep(id) {
      activeId = id;
      renderTabs();
      renderFlow();
      renderDetail();
    }

    renderTabs();
    renderFlow();
    renderStorage();
    renderDetail();
  </script>
</body>
</html>
