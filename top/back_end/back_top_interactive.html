<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ff 后端 Top 连接图</title><style>:root{--bg:#f7faf9;--ink:#162127;--muted:#5d6b73;--line:#b9c8ce;--active:#e94235}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft YaHei",Arial,sans-serif;color:var(--ink)}header{padding:18px 24px;background:#fff;border-bottom:1px solid #dbe5e8}h1{margin:0;font-size:22px}.sub{font-size:13px;color:var(--muted);margin-top:6px}.layout{display:grid;grid-template-columns:minmax(1100px,1fr) 360px;gap:16px;padding:16px}.wrap{background:#fff;border:1px solid #dbe5e8;border-radius:8px;overflow:auto}.canvas{position:relative;width:1500px;height:720px}.node{position:absolute;width:190px;height:72px;border:1.5px solid #93a8af;border-radius:8px;background:#eef4ff;padding:13px;z-index:3;box-shadow:0 10px 22px rgba(25,45,55,.08)}.node.external{background:#fff4ef}.node.active{border:3px solid var(--active);box-shadow:0 12px 28px rgba(233,66,53,.22)}.node.dim{opacity:.24}.name{font-weight:700;font-size:14px}.src{font-size:12px;color:var(--muted);margin-top:8px}svg{position:absolute;inset:0;width:1500px;height:720px;z-index:1}.line{fill:none;stroke:var(--line);stroke-width:2.2;marker-end:url(#arrow)}.line.active{stroke:var(--active);stroke-width:4.5;filter:drop-shadow(0 0 5px rgba(233,66,53,.35));marker-end:url(#arrowActive)}.line.dim{opacity:.12}.hit{fill:none;stroke:transparent;stroke-width:18;cursor:pointer}.label{font-size:11px;fill:#8a4d45;font-weight:700;paint-order:stroke;stroke:#fff;stroke-width:5}.side{background:#fff;border:1px solid #dbe5e8;border-radius:8px;padding:18px;position:sticky;top:16px;height:calc(100vh - 32px);overflow:auto}.pillbar{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.pill{border:1px solid #c7d5d9;background:#f8fbfb;border-radius:999px;padding:7px 10px;font-size:12px;cursor:pointer}.pill.active{border-color:var(--active);color:var(--active);background:#fff4f2}.card{border-top:1px solid #e1e9eb;padding-top:14px;margin-top:14px}.card h3{font-size:14px;margin:0 0 8px}.card p,.hint{font-size:13px;color:#33434a;line-height:1.65}code{font-family:Consolas,monospace;background:#f3f6f7;padding:2px 4px;border-radius:4px}.list{line-height:1.7;font-size:13px}.badge{display:inline-block;border-radius:4px;padding:2px 6px;background:#edf4f6;margin:3px;font-size:12px}</style></head><body><header><h1>ff 后端 Top 连接图</h1><div class="sub">依据 simulator-ffc9fad707a7acb0be5c7d4fe7c06d48987c73e0；点击线高亮路径并查看源码依据。</div></header><div class="layout"><main class="wrap"><div id="canvas" class="canvas"><svg viewBox="0 0 1500 720"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#b9c8ce"></path></marker><marker id="arrowActive" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#e94235"></path></marker></defs><g id="lines"></g></svg><div id="nodes"></div></div></main><aside class="side"><h2 id="title">选择路径</h2><div class="hint">红色是当前路径；ff 版本不再包含 <code>front_stall</code>。</div><div id="buttons" class="pillbar"></div><div class="card"><h3>说明</h3><p id="summary"></p></div><div class="card"><h3>相关模块</h3><div id="mods" class="hint"></div></div><div class="card"><h3>源码依据</h3><ul id="sources" class="list"></ul></div></aside></div><script>const mods=[{"id":"external_front","label":"FrontPreIO 拆线输入","type":"external","source":"rv_simu_mmu_v2.cpp:675-695","x":30,"y":210,"w":190,"h":72},{"id":"preiduqueue_top","label":"preiduqueue_top","type":"backend","source":"BackTop.cpp:39,225","x":260,"y":210,"w":190,"h":72},{"id":"idu_top","label":"idu_top","type":"backend","source":"BackTop.cpp:226,237","x":500,"y":160,"w":190,"h":72},{"id":"ren_top","label":"ren_top","type":"backend","source":"BackTop.cpp:229,272","x":500,"y":300,"w":190,"h":72},{"id":"dispatch_top","label":"dispatch_top","type":"backend","source":"BackTop.cpp:245,276","x":740,"y":300,"w":190,"h":72},{"id":"isu_top","label":"isu_top","type":"backend","source":"BackTop.cpp:233,263","x":980,"y":220,"w":190,"h":72},{"id":"prf_top","label":"prf_top","type":"backend","source":"BackTop.cpp:230-232,271","x":980,"y":380,"w":190,"h":72},{"id":"exu_top","label":"exu_top","type":"backend","source":"BackTop.cpp:249-253","x":1220,"y":320,"w":190,"h":72},{"id":"rob_top","label":"rob_top","type":"backend","source":"BackTop.cpp:238-241,280-282","x":740,"y":80,"w":190,"h":72},{"id":"csr_top","label":"csr_top","type":"backend","source":"BackTop.cpp:228,250-252","x":1220,"y":80,"w":190,"h":72},{"id":"lsu_top","label":"lsu_top","type":"backend","source":"BackTop.cpp:234-236,248,264","x":740,"y":520,"w":190,"h":72},{"id":"external_mem","label":"外部 DCache/MMU/Peripheral","type":"external","source":"BackTop.cpp:151-166","x":980,"y":560,"w":190,"h":72}];const edges=[{"id":"b1","from":"external_front","to":"preiduqueue_top","label":"front2pre","pathIds":["front"]},{"id":"b2","from":"preiduqueue_top","to":"idu_top","label":"pre_issue","pathIds":["decode"]},{"id":"b3","from":"idu_top","to":"ren_top","label":"dec2ren","pathIds":["decode"]},{"id":"b4","from":"ren_top","to":"dispatch_top","label":"ren2dis","pathIds":["rename"]},{"id":"b5","from":"dispatch_top","to":"isu_top","label":"dis2iss","pathIds":["issue"]},{"id":"b6","from":"isu_top","to":"prf_top","label":"iss2prf","pathIds":["issue"]},{"id":"b7","from":"prf_top","to":"exu_top","label":"prf2exe","pathIds":["execute"]},{"id":"b8","from":"dispatch_top","to":"rob_top","label":"dis2rob","pathIds":["commit"]},{"id":"b9","from":"exu_top","to":"rob_top","label":"exu2rob","pathIds":["commit"]},{"id":"b10","from":"rob_top","to":"dispatch_top","label":"rob2dis","pathIds":["commit"]},{"id":"b11","from":"exu_top","to":"csr_top","label":"exe2csr","pathIds":["csr"]},{"id":"b12","from":"csr_top","to":"exu_top","label":"csr2exe","pathIds":["csr"]},{"id":"b13","from":"dispatch_top","to":"lsu_top","label":"dis2lsu","pathIds":["lsu"]},{"id":"b14","from":"exu_top","to":"lsu_top","label":"exe2lsu","pathIds":["lsu"]},{"id":"b15","from":"lsu_top","to":"exu_top","label":"lsu2exe","pathIds":["lsu"]},{"id":"b16","from":"external_mem","to":"lsu_top","label":"memory resp","pathIds":["lsu"]},{"id":"b17","from":"lsu_top","to":"external_mem","label":"memory req","pathIds":["lsu"]},{"id":"b18","from":"rob_top","to":"preiduqueue_top","label":"rob_bcast/commit","pathIds":["commit","front"]},{"id":"b19","from":"preiduqueue_top","to":"external_front","label":"pre2front fire/ready","pathIds":["front"]}];const paths={"front":{"title":"前后端入口/反馈","summary":"ff 版本 FrontPreIO 没有 front_stall。front2pre 拆线进入 back_top 后在内部重新打包给 preiduqueue_top，pre2front.fire/ready 再形成 fire/stall。","sources":["rv_simu_mmu_v2.cpp:675-695","back-end/include/IO.h:108-159","back-end/BackTop.cpp:39,225"]},"decode":{"title":"取指后解码路径","summary":"PreIduQueue 接收前端包，送入 IDU 解码，再把 DecRenIO 送到 Rename。","sources":["BackTop.cpp:225-229","BackTop.cpp:237"]},"rename":{"title":"重命名/派发路径","summary":"Rename 分配物理寄存器并生成 ren2dis，Dispatch 做 ROB/IQ/LSU 资源分配和派发。","sources":["BackTop.cpp:229,245,272,276"]},"issue":{"title":"Issue/PRF 路径","summary":"Dispatch 送 issue queue，ISU 选择可发射 uop，PRF 根据 iss2prf 读源操作数。","sources":["BackTop.cpp:233,263,271"]},"execute":{"title":"执行路径","summary":"PRF 输出 prf2exe，EXU 执行后产生写回、唤醒、CSR、LSU 和 ROB 结果。","sources":["BackTop.cpp:249-253","BackTop.cpp:264"]},"commit":{"title":"ROB/提交/恢复路径","summary":"Dispatch/EXU/LSU/CSR 等结果进入 ROB，ROB 产生 commit、flush 和 broadcast，back_top 组装 Back_out。","sources":["BackTop.cpp:238-241","BackTop.cpp:280-311","BackTop.cpp:313-343"]},"csr":{"title":"CSR/异常路径","summary":"EXU 到 CSR 读写，CSR 与 ROB broadcast 一起决定 trap、epc、权限状态，并输出给前端。","sources":["BackTop.cpp:228,250-252","BackTop.cpp:286-308"]},"lsu":{"title":"LSU/内存边界路径","summary":"Dispatch/EXU 给 LSU，LSU 对外连接 DCache/MMU/Peripheral，并把 load/store 结果回写 EXU/ROB/Dispatch。","sources":["BackTop.cpp:234-236","BackTop.cpp:248,264","BackTop.cpp:151-166"]}};const map=Object.fromEntries(mods.map(m=>[m.id,m]));function c(id){const m=map[id];return{x:m.x+m.w/2,y:m.y+m.h/2}}function d(e){const a=c(e.from),b=c(e.to);const dx=Math.max(50,Math.abs(b.x-a.x)*.45);return 'M '+a.x+' '+a.y+' C '+(a.x+dx)+' '+a.y+', '+(b.x-dx)+' '+b.y+', '+b.x+' '+b.y}function render(){document.getElementById('nodes').innerHTML=mods.map(m=>'<div id="n-'+m.id+'" class="node '+m.type+'" style="left:'+m.x+'px;top:'+m.y+'px"><div class="name">'+m.label+'</div><div class="src">'+m.source+'</div></div>').join('');document.getElementById('lines').innerHTML=edges.map(e=>'<path id="l-'+e.id+'" class="line" d="'+d(e)+'"></path><path class="hit" d="'+d(e)+'" data-path="'+e.pathIds[0]+'"></path><text class="label"><textPath href="#l-'+e.id+'" startOffset="50%" text-anchor="middle">'+e.label+'</textPath></text>').join('');document.querySelectorAll('.hit').forEach(x=>x.onclick=()=>sel(x.dataset.path));document.getElementById('buttons').innerHTML=Object.entries(paths).map(([id,p])=>'<button class="pill" data-path="'+id+'">'+p.title+'</button>').join('');document.querySelectorAll('.pill').forEach(x=>x.onclick=()=>sel(x.dataset.path));sel('front')}function sel(id){const p=paths[id];const es=edges.filter(e=>e.pathIds.includes(id));const ns=new Set(es.flatMap(e=>[e.from,e.to]));document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.dataset.path===id));mods.forEach(m=>{const el=document.getElementById('n-'+m.id);el.classList.toggle('active',ns.has(m.id));el.classList.toggle('dim',!ns.has(m.id))});edges.forEach(e=>{const el=document.getElementById('l-'+e.id);const on=e.pathIds.includes(id);el.classList.toggle('active',on);el.classList.toggle('dim',!on)});document.getElementById('title').textContent=p.title;document.getElementById('summary').textContent=p.summary;document.getElementById('mods').innerHTML=[...ns].map(n=>'<span class="badge">'+map[n].label+'</span>').join('');document.getElementById('sources').innerHTML=p.sources.map(s=>'<li><code>simulator-ffc9fad707a7acb0be5c7d4fe7c06d48987c73e0/'+(s.startsWith('rv_simu')?s:(s.includes('/')?s:'back-end/'+s))+'</code></li>').join('')}render();</script></body></html>
